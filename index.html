            return (

        function App() {
            const [view, setView] = useState('cover'); 
            const [user, setUser] = useState(null);
            const [isTeacher, setIsTeacher] = useState(false);
            const [teacherData, setTeacherData] = useState(null);
            const [student, setStudent] = useState({ name: '', class: '', subject: SUBJECT_LIST[0], selectedFile: '' });
            const [allQuestions, setAllQuestions] = useState([]);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [dashTab, setDashTab] = useState('results'); 
            const [qSubTab, setQSubTab] = useState('bank');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [activeQuizQuestions, setActiveQuizQuestions] = useState([]); 
            const [userAnswers, setUserAnswers] = useState([]);
            const [score, setScore] = useState(0);
            const [maxPossibleScore, setMaxPossibleScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(null);
            const [teacherAuthUI, setTeacherAuthUI] = useState({ username: '', password: '', show: false, isRegistering: false });
            const [localQuestions, setLocalQuestions] = useState([]); 
            const [newQ, setNewQ] = useState({ q: '', a: ['', ''], c: 0, type: 'mcq', p: 10 }); 
            const [fileName, setFileName] = useState("");
            const [examDuration, setExamDuration] = useState(30);
            const [examClass, setExamClass] = useState("7"); 
            const [importText, setImportText] = useState("");
            const [showImport, setShowImport] = useState(false);
            const [expandedFile, setExpandedFile] = useState(null);
            const [scheduleData, setScheduleData] = useState({ visible: true, releaseDate: '', expiryDate: '', isRandom: false });
            const [editModal, setEditModal] = useState({ show: false, data: null, isLocal: false });
            const [renameModal, setRenameModal] = useState({ show: false, oldName: '', newName: '', oldClass: '', newClass: '' });
            const [resultFilterSubject, setResultFilterSubject] = useState('الكل');
            const [resultSort, setResultSort] = useState('timestamp_desc');

            const [teacherReview, setTeacherReview] = useState({ show: false, resultData: null });

            const [aiLoading, setAiLoading] = useState(false);
            const [explanation, setExplanation] = useState(null);
            const [aiCommand, setAiCommand] = useState(""); 

            const [notify, setNotify] = useState({ show: false, msg: '', type: 'info', confirm: false, onConfirm: null });

            const showNotify = (msg, type = 'info', confirm = false, onConfirm = null) => {
                setNotify({ show: true, msg, type, confirm, onConfirm });
            };

            const closeNotify = () => setNotify({ ...notify, show: false });

            const t = useCallback((key) => {
                const translations = {
                    ar: {
                        title: "NURUL ILMI SMART EXAM <br /> (NISE)", subtitle: "نظام نور العلم للاختبارات الذكية", startBtn: "ابدأ الاختبار",
                        studentName: "اسم الطالب", studentClass: "الفصل الدراسي", subject: "المادة الدراسية",
                        chooseFile: "-- اختر ملف الاختبار --", teacherPanel: "لوحة المعلم",
                        login: "تسجيل دخول", register: "إنشاء حساب", username: "اسم المستخدم", password: "كلمة المرور",
                        cancel: "إلغاء", logout: "خروج", dashboard: "إدارة المنصة", results: "النتائج",
                        questions: "الأسئلة", bank: "بنك الأسئلة", add: "إضافة الأسئلة", save: "حفظ",
                        import: "استيراد سريع", next: "السؤال التالي", prev: "السابق", send: "إرسال الإجابات",
                        score: "الدرجة", total: "المجموع", review: "مراجعة الإجابات", finish: "إنهاء",
                        noTests: "لا توجد اختبارات متاحة", mcq: "خيار متعدد", tf: "صح وخطأ",
                        correct: "صح", wrong: "خطأ", student: "الطالب", class: "الفصل", delete: "حذف", deleteAll: "حذف الكل",
                        visible: "مرئي", hidden: "مخفي", schedule: "الجدولة", qPlaceholder: "اكتب نص السؤال هنا...",
                        importPlaceholder: "نص السؤال | خيار1, خيار2, خيار3, خيار4 | 0", answerLabel: "الجواب: ",
                        saveBank: "حفظ الاختبار في البنك", previewTitle: "معاينة الأسئلة",
                        examFile: "ملف الاختبار", duration: "المدة (دقائق)", yes: "نعم", no: "لا",
                        points: "النقاط", renameFile: "تغيير اسم الملف والفصل", addMoreQs: "إضافة أسئلة لهذا الملف",
                        randomize: "ترتيب عشوائي", duplicateFile: "مضاعفة الملف",
                        exportExcel: "تصدير للتميز (Excel)",
                        reviewStudent: "مراجعة إجابات الطالب"
                    }
                };
                return translations['ar'][key] || key;
            }, []);

            const callGemini = async (prompt, systemPrompt = "", isJson = false) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const body = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };
                if (isJson) {
                    body.generationConfig = { 
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                questions: {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: {
                                            q: { type: "STRING" },
                                            a: { type: "ARRAY", items: { type: "STRING" } },
                                            c: { type: "NUMBER" },
                                            type: { type: "STRING" },
                                            p: { type: "NUMBER" }
                                        },
                                        required: ["q", "a", "c", "type", "p"]
                                    }
                                }
                            }
                        }
                    };
                }

                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(body)
                        });
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (e) {
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(res => setTimeout(res, delay));
                    }
                }
                throw new Error("فشل الاتصال بالذكاء الاصطناعي");
            };

            const generateAiQuestions = async () => {
                if (!fileName) return showNotify("يرجى إدخال اسم ملف الاختبار أولاً", "error");
                if (!aiCommand.trim()) return showNotify("يرجى كتابة ما تطلبه من الذكاء الاصطناعي أولاً (مثلاً: اكتب 5 أسئلة في الفقه)", "warning");
                
                setAiLoading(true);
                try {
                    const prompt = `الموضوع: ${student.subject}.\nأمر المعلم: ${aiCommand}.\nيرجى توليد الأسئلة المطلوبة باللغة العربية.`;
                    const systemPrompt = "أنت مساعد تعليمي خبير. قم بتوليد الأسئلة المطلوبة بدقة تربوية وفقاً لموضوع المادة المحددة وأمر المعلم. يجب أن تكون الإجابات دقيقة. عيّن قيمة 10 نقاط (p: 10) لكل سؤال بشكل افتراضي.";
                    const resultText = await callGemini(prompt, systemPrompt, true);
                    const parsed = JSON.parse(resultText);
                    
                    const aiQs = parsed.questions.map((q, idx) => ({
                        ...q,
                        p: q.p || 10,
                        id: Date.now() + idx
                    }));
                    setLocalQuestions([...localQuestions, ...aiQs]);
                    setAiCommand(""); 
                    showNotify(`تم توليد ${aiQs.length} أسئلة ذكية بنجاح!`, "success");
                } catch (e) {
                    showNotify("فشل توليد الأسئلة: " + e.message, "error");
                } finally {
                    setAiLoading(false);
                }
            };

            const explainQuestion = async (q, correctIdx, userIdx) => {
                setAiLoading(true);
                setExplanation(null);
                try {
                    const prompt = `السؤال: ${q.q}\nالخيارات: ${q.a.join(', ')}\nالخيار الصحيح هو الخيار رقم ${correctIdx + 1} (${q.a[correctIdx]}).\nلقد أجاب الطالب بـ ${userIdx !== null ? q.a[userIdx] : 'لم يجب'}.\nاشرح لي بوضوح وببساطة لماذا هذه هي الإجابة الصحيحة وما هو المبدأ العلمي أو اللغوي وراء ذلك.`;
                    const systemPrompt = "أنت مدرس صبور وحكيم. اشرح الإجابات بأسلوب تعليمي مشجع باللغة العربية.";
                    const explanationText = await callGemini(prompt, systemPrompt);
                    setExplanation(explanationText);
                } catch (e) {
                    showNotify("فشل الحصول على شرح: " + e.message, "error");
                } finally {
                    setAiLoading(false);
                }
            };

            const handleTeacherAuth = async () => {
                if (!user) return;
                const { username, password, isRegistering } = teacherAuthUI;
                if (!username || !password) return showNotify("يرجى إدخال البيانات كاملة");
                
                try {
                    const profilesRef = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'teacher_profiles');
                    const snap = await sdk.getDocs(profilesRef);
                    const profiles = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                    
                    if (isRegistering) {
                        if (profiles.find(p => p.username === username)) return showNotify("المستخدم موجود بالفعل", 'error');
                        await sdk.addDoc(profilesRef, { username, password, timestamp: sdk.serverTimestamp(), userId: user.uid });
                        showNotify("تم إنشاء الحساب بنجاح!", 'success');
                        setTeacherAuthUI(p => ({ ...p, isRegistering: false }));
                    } else {
                        const found = profiles.find(p => p.username === username && p.password === password);
                        if (!found) return showNotify("خطأ في اسم المستخدم أو كلمة المرور", 'error');
                        setTeacherData(found); setIsTeacher(true); setView('dashboard'); setTeacherAuthUI(p => ({ ...p, show: false }));
                    }
                } catch (e) { showNotify("خطأ: " + e.message, 'error'); }
            };

            const addToLocal = () => {
                if (!newQ.q.trim()) return;
                setLocalQuestions([...localQuestions, { ...newQ, id: Date.now() }]);
                setNewQ({ q: '', a: newQ.type === 'tf' ? ['صح', 'خطأ'] : ['', ''], c: 0, type: newQ.type, p: 10 });
            };

            const saveEditedQuestion = async () => {
                if (!editModal.data) return;
                if (editModal.isLocal) {
                    setLocalQuestions(localQuestions.map(q => q.id === editModal.data.id ? editModal.data : q));
                    setEditModal({ show: false, data: null, isLocal: false });
                    showNotify("تم تحديث السؤال في المعاينة", 'success');
                    return;
                }
                try {
                    const qRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'questions_db', String(editModal.data.id));
                    await sdk.updateDoc(qRef, { q: editModal.data.q, a: editModal.data.a, c: editModal.data.c, type: editModal.data.type, p: Number(editModal.data.p) });
                    setEditModal({ show: false, data: null, isLocal: false });
                    showNotify("تم تحديث السؤال بنجاح", 'success');
                } catch (e) { console.error(e); }
            };

            const duplicateFileBank = async (oldName) => {
                const qsToCopy = groupedQuestions[oldName];
                if (!qsToCopy || qsToCopy.length === 0) return;
                const newFileName = `${oldName} (نسخة)`;
                try {
                    const batch = sdk.writeBatch(db);
                    qsToCopy.forEach(q => {
                        const docRef = sdk.doc(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'questions_db'));
                        const { id, ...cleanData } = q;
                        batch.set(docRef, { ...cleanData, fileName: newFileName, timestamp: sdk.serverTimestamp() });
                    });
                    await batch.commit();
                    showNotify("تم مضاعفة الملف بنجاح", 'success');
                } catch (e) { showNotify("فشل مضاعفة الملف", 'error'); }
            };

            const renameFileBank = async () => {
                const { oldName, newName, newClass } = renameModal;
                if (!newName.trim()) return showNotify("يرجى إدخال اسم ملف صالح", 'error');
                try {
                    const batch = sdk.writeBatch(db);
                    const toUpdate = allQuestions.filter(q => q.fileName === oldName);
                    toUpdate.forEach(q => {
                        const qRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'questions_db', String(q.id));
                        batch.update(qRef, { fileName: newName, examClass: newClass });
                    });
                    await batch.commit();
                    setExpandedFile(newName);
                    setRenameModal({ show: false, oldName: '', newName: '', oldClass: '', newClass: '' });
                    showNotify("تم تحديث البيانات بنجاح", 'success');
                } catch (e) { showNotify("فشل التحديث", 'error'); }
            };

            const prepareAddMoreQs = (fName) => {
                const firstQ = groupedQuestions[fName][0];
                if (!firstQ) return;
                setFileName(fName);
                setStudent(prev => ({ ...prev, subject: firstQ.subject }));
                setExamClass(firstQ.examClass || "7");
                setExamDuration(firstQ.duration || 30);
                setQSubTab('add');
            };

            const saveQuestionsToDB = async () => {
                if (!fileName.trim()) return showNotify("⚠️ يجب إدخال اسم ملف الاختبار قبل الحفظ!", 'error');
                if (localQuestions.length === 0) return showNotify("يرجى إضافة أسئلة أولاً");
                if (!user) return;
                try {
                    const batch = sdk.writeBatch(db);
                    localQuestions.forEach(q => {
                        const docRef = sdk.doc(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'questions_db'));
                        const { id, ...cleanData } = q;
                        batch.set(docRef, { ...cleanData, fileName, subject: student.subject, examClass, duration: parseInt(examDuration), authorId: teacherData.id, visible: true, timestamp: sdk.serverTimestamp(), userId: user.uid });
                    });
                    await batch.commit();
                    setLocalQuestions([]); setFileName(""); setQSubTab('bank'); showNotify("تم الحفظ بنجاح", 'success');
                } catch (e) { showNotify("فشل الحفظ: " + e.message, 'error'); }
            };

            const deleteSingleResult = (resId) => {
                showNotify("هل تود حذف هذه النتيجة؟", 'warning', true, async () => {
                    try {
                        const docRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'quiz_results', String(resId));
                        await sdk.deleteDoc(docRef);
                        showNotify("تم الحذف بنجاح", 'success');
                    } catch (e) { showNotify("فشل الحذف", 'error'); }
                });
            };

            const deleteSingleQuestion = (qId) => {
                showNotify("حذف السؤال نهائياً؟", 'warning', true, async () => {
                    try {
                        const docRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'questions_db', String(qId));
                        await sdk.deleteDoc(docRef);
                    } catch (e) { showNotify("فشل حذف السؤال", 'error'); }
                });
            };

            const deleteFileBank = (fName) => {
                showNotify(`سيتم حذف ملف "${fName}" بجميع أسئلته، هل أنت متأكد؟`, 'warning', true, async () => {
                    try {
                        const batch = sdk.writeBatch(db);
                        const toDelete = allQuestions.filter(q => q.fileName === fName);
                        toDelete.forEach(q => {
                            const docRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'questions_db', String(q.id));
                            batch.delete(docRef);
                        });
                        await batch.commit();
                        setExpandedFile(null);
                        showNotify("تم حذف الملف بنجاح", 'success');
                    } catch (e) { showNotify("فشل حذف الملف", 'error'); }
                });
            };

            const saveScheduleSettings = async (fName) => {
                try {
                    const batch = sdk.writeBatch(db);
                    const toUpdate = allQuestions.filter(q => q.fileName === fName);
                    toUpdate.forEach(q => {
                        const qRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'questions_db', String(q.id));
                        batch.update(qRef, { visible: scheduleData.visible, releaseDate: scheduleData.releaseDate, expiryDate: scheduleData.expiryDate, isRandom: scheduleData.isRandom });
                    });
                    await batch.commit();
                    showNotify("تم تحديث الإعدادات", 'success');
                } catch (e) { console.error(e); }
            };

            const processImport = () => {
                const lines = importText.split('\n').filter(l => l.trim());
                const imported = lines.map((line, idx) => {
                    const parts = line.split('|');
                    if (parts.length >= 2) {
                        const opts = parts[1].split(',').map(o => o.trim());
                        return { id: Date.now() + idx, q: parts[0].trim(), a: opts, c: parseInt(parts[2]) || 0, type: opts.length === 2 ? 'tf' : 'mcq', p: 10 };
                    }
                    return null;
                }).filter(q => q !== null);
                setLocalQuestions([...localQuestions, ...imported]);
                setShowImport(false); setImportText("");
            };

            const exportToExcel = () => {
                if (filteredResults.length === 0) return showNotify("لا توجد بيانات لتصديرها", "warning");
                const headers = ["اسم الطالب", "المادة", "الفصل", "الدرجة", "المجموع", "التاريخ"];
                const rows = filteredResults.map(r => [
                    r.student_name, r.subject, r.student_class, r.score, r.total,
                    r.timestamp ? new Date(r.timestamp.seconds * 1000).toLocaleString('ar-EG') : '-'
                ]);
                let csvContent = "\uFEFF"; 
                csvContent += headers.join(",") + "\n";
                rows.forEach(row => { csvContent += row.map(cell => `"${cell}"`).join(",") + "\n"; });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `نتائج_${resultFilterSubject}_${new Date().toLocaleDateString()}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showNotify("تم تصدير الملف بنجاح", "success");
            };

            const startExam = () => {
                const qs = allQuestions.filter(q => q.subject === student.subject && q.fileName === student.selectedFile);
                if (qs.length === 0) return showNotify("⚠️ لا توجد أسئلة متاحة حالياً", 'error');
                if (!student.name || !student.class) return showNotify("⚠️ يرجى إكمال بيانات الطالب", 'error');
                let finalQs = [...qs];
                if (qs[0]?.isRandom) {
                    for (let i = finalQs.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [finalQs[i], finalQs[j]] = [finalQs[j], finalQs[i]];
                    }
                }
                setActiveQuizQuestions(finalQs);
                setTimeLeft((qs[0]?.duration || 30) * 60);
                setUserAnswers(new Array(qs.length).fill(null));
                setCurrentIdx(0);
                setIsSubmitting(false);
                setView('quiz');
            };

            const submitFinalQuiz = async () => {
                if (isSubmitting || !user) return;
                setIsSubmitting(true);
                const quizAuthorId = activeQuizQuestions[0]?.authorId || null;
                
                let finalScore = 0;
                let totalPossible = 0;
                userAnswers.forEach((ans, idx) => { 
                    const qPoints = activeQuizQuestions[idx].p || 10;
                    totalPossible += qPoints;
                    if (activeQuizQuestions[idx] && ans === activeQuizQuestions[idx].c) finalScore += qPoints; 
                });
                
                setScore(finalScore);
                setMaxPossibleScore(totalPossible);
                
                try {
                    await sdk.addDoc(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'quiz_results'), {
                        student_name: student.name,
                        student_class: student.class,
                        subject: student.subject,
                        fileName: student.selectedFile,
                        score: finalScore,
                        total: totalPossible,
                        timestamp: sdk.serverTimestamp(),
                        userId: user.uid,
                        quizAuthorId,
                        user_answers: userAnswers,
                        questions_snapshot: activeQuizQuestions.map(q => ({ q: q.q, a: q.a, c: q.c, type: q.type, p: q.p }))
                    });
                    setView('result');
                } catch (e) { 
                    console.error(e);
                    setIsSubmitting(false); 
                }
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await sdk.signInWithCustomToken(auth, __initial_auth_token); } catch (tErr) { await sdk.signInAnonymously(auth); }
                        } else { await sdk.signInAnonymously(auth); }
                    } catch (e) { console.error(e); } finally { setLoading(false); }
                };
                initAuth();
                const unsubscribe = sdk.onAuthStateChanged(auth, (u) => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubQuestions = sdk.onSnapshot(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'questions_db'), 
                    (snap) => setAllQuestions(snap.docs.map(d => ({ ...d.data(), id: String(d.id) }))),
                    (err) => console.error(err)
                );
                const unsubResults = sdk.onSnapshot(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'quiz_results'), 
                    (snap) => setResults(snap.docs.map(d => ({ ...d.data(), id: String(d.id) }))),
                    (err) => console.error(err)
                );
                return () => { unsubQuestions(); unsubResults(); };
            }, [user]);

            useEffect(() => {
                if (view === 'quiz' && timeLeft > 0 && !isSubmitting) {
                    const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                    return () => clearInterval(timer);
                } else if (view === 'quiz' && timeLeft === 0 && !isSubmitting) {
                    submitFinalQuiz();
                }
            }, [view, timeLeft, isSubmitting]);

            const availableFiles = useMemo(() => {
                const now = Date.now();
                return [...new Set(allQuestions.filter(q => {
                    if (q.subject !== student.subject) return false;
                    if (q.visible === false) return false;
                    if (q.releaseDate && q.releaseDate.trim() !== "" && now < new Date(q.releaseDate).getTime()) return false;
                    if (q.expiryDate && q.expiryDate.trim() !== "" && now > new Date(q.expiryDate).getTime()) return false;
                    return true;
                }).map(q => q.fileName))];
            }, [allQuestions, student.subject]);

            const groupedQuestions = useMemo(() => {
                const groups = {};
                allQuestions.forEach(q => {
                    if (isTeacher && teacherData && q.authorId !== teacherData.id) return;
                    if (!groups[q.fileName]) groups[q.fileName] = [];
                    groups[q.fileName].push(q);
                });
                return groups;
            }, [allQuestions, isTeacher, teacherData]);

            const filteredResults = useMemo(() => {
                let data = [...results];
                if (isTeacher && teacherData) data = data.filter(r => r.quizAuthorId === teacherData.id);
                if (resultFilterSubject !== 'الكل') data = data.filter(r => r.subject === resultFilterSubject);
                data.sort((a, b) => {
                    if (resultSort === 'timestamp_desc') return (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0);
                    if (resultSort === 'timestamp_asc') return (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0);
                    if (resultSort === 'score_desc') return (b.score || 0) - (a.score || 0);
                    if (resultSort === 'score_asc') return (a.score || 0) - (b.score || 0);
                    if (resultSort === 'student_name_asc') return a.student_name.localeCompare(b.student_name, 'ar');
                    if (resultSort === 'student_name_desc') return b.student_name.localeCompare(a.student_name, 'ar');
                    return 0;
                });
                return data;
            }, [results, resultFilterSubject, resultSort, isTeacher, teacherData]);

            const progressPercent = useMemo(() => (activeQuizQuestions.length === 0 ? 0 : (userAnswers.filter(a => a !== null).length / activeQuizQuestions.length) * 100), [userAnswers, activeQuizQuestions]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-50 font-bold">جاري التحميل...</div>;

            return (
                <div className="min-h-screen text-[#1e293b] font-tajawal text-right overflow-x-hidden" dir="rtl">
                    
                    {/* NOTIFICATION MODAL */}
                    {notify.show && (
                        <div className="fixed inset-0 modal-overlay z-[1300] flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl animate-in text-center border-t-8 border-emerald-500">
                                <div className="text-5xl mb-4">{notify.type === 'success' ? '✅' : notify.type === 'error' ? '❌' : notify.type === 'warning' ? '⚠️' : 'ℹ️'}</div>
                                <p className="text-lg font-black text-slate-800 mb-8">{notify.msg}</p>
                                <div className="flex gap-4">
                                    {notify.confirm ? (
                                        <>
                                            <button onClick={() => { notify.onConfirm(); closeNotify(); }} className="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95">{t('yes')}</button>
                                            <button onClick={closeNotify} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black active:scale-95">{t('no')}</button>
                                        </>
                                    ) : (
                                        <button onClick={closeNotify} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">موافق</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AI EXPLANATION MODAL (ONLY IN REVIEW) */}
                    {explanation && (
                        <div className="fixed inset-0 modal-overlay z-[1100] flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-[3rem] max-w-lg w-full shadow-2xl animate-in border-t-[12px] border-violet-500 relative max-h-[90vh] flex flex-col">
                                <button onClick={() => setExplanation(null)} className="absolute top-4 left-4 p-2.5 bg-slate-100 rounded-full hover:bg-red-50 hover:text-red-500 transition-all z-10">
                                    <Icon name="x" className="w-6 h-6" />
                                </button>
                                <div className="flex items-center gap-3 mb-6 text-violet-600 shrink-0">
                                    <div className="w-10 h-10 bg-violet-100 rounded-xl flex items-center justify-center">✨</div>
                                    <h3 className="text-xl font-black">شرح الإجابة من الذكاء الاصطناعي</h3>
                                </div>
                                <div className="text-slate-700 leading-relaxed font-bold whitespace-pre-line text-sm overflow-y-auto pr-2 hide-scroll">{explanation}</div>
                                <button onClick={() => setExplanation(null)} className="w-full mt-8 bg-violet-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-violet-700 transition-all active:scale-95 shrink-0">فهمت، شكراً لك!</button>
                            </div>
                        </div>
                    )}

                    {aiLoading && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1200] flex flex-col items-center justify-center gap-4">
                            <div className="w-24 h-24 rounded-[2rem] gemini-loading shadow-2xl flex items-center justify-center text-white text-4xl animate-bounce">✨</div>
                            <p className="text-white font-black text-xl animate-pulse">جاري الاستعانة بالذكاء الاصطناعي...</p>
                        </div>
                    )}

                    {/* TEACHER REVIEW MODAL */}
                    {teacherReview.show && teacherReview.resultData && (
                        <div className="fixed inset-0 modal-overlay z-[700] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3.5rem] max-w-5xl w-full shadow-2xl overflow-hidden flex flex-col max-h-[85vh] animate-in text-right">
                                <div className="bg-indigo-900 p-6 text-white flex justify-between items-center shrink-0 border-b border-white/10">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-emerald-500/20 rounded-2xl flex items-center justify-center">
                                            <Icon name="eye" className="text-emerald-400 w-6 h-6" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-black">{t('reviewStudent')}</h2>
                                            <p className="text-[11px] opacity-70 font-bold tracking-widest">{teacherReview.resultData.student_name} • {teacherReview.resultData.subject} • {teacherReview.resultData.student_class}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setTeacherReview({ show: false, resultData: null })} className="bg-white/10 p-2.5 rounded-2xl transition-all hover:bg-red-500/20 hover:text-red-400">
                                        <Icon name="x" className="w-6 h-6" />
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 md:p-8 bg-slate-50/50 hide-scroll">
                                    {(!teacherReview.resultData.questions_snapshot || teacherReview.resultData.questions_snapshot.length === 0) ? (
                                        <div className="py-20 text-center text-slate-400 font-bold italic">عذراً، هذا التقرير قديم ولا يحتوي على تفاصيل الإجابات.</div>
                                    ) : (
                                        <div className="grid grid-cols-1 gap-4">
                                            {teacherReview.resultData.questions_snapshot.map((q, idx) => {
                                                const studentAns = teacherReview.resultData.user_answers[idx];
                                                const isCorrect = studentAns === q.c;
                                                const isUnanswered = studentAns === null;
                                                
                                                return (
                                                    <div key={idx} className="bg-white p-5 md:p-6 rounded-[2.5rem] border border-slate-100 shadow-sm transition-all hover:shadow-md">
                                                        <div className="flex items-start gap-4 mb-4">
                                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shrink-0 ${isCorrect ? 'bg-emerald-100 text-emerald-600' : isUnanswered ? 'bg-slate-100 text-slate-400' : 'bg-red-100 text-red-600'}`}>
                                                                {idx + 1}
                                                            </div>
                                                            <div className="flex-1">
                                                                <h3 className="text-base md:text-lg font-black text-slate-800 leading-relaxed">{q.q}</h3>
                                                            </div>
                                                            <div className="shrink-0 flex items-center gap-2">
                                                                <span className={`px-3 py-1.5 rounded-full text-[10px] font-black tracking-tight ${isCorrect ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : isUnanswered ? 'bg-slate-100 text-slate-500' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                                                                    {isCorrect ? 'إجابة صحيحة' : isUnanswered ? 'لم يجب' : 'إجابة خاطئة'}
                                                                </span>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-2.5">
                                                            {q.a.map((opt, optIdx) => (opt && (q.type === 'mcq' || optIdx < 2)) && (
                                                                <div key={optIdx} className={`px-4 py-3 rounded-2xl border-2 text-xs font-bold transition-all flex items-center gap-3 ${optIdx === q.c ? 'border-emerald-500 bg-emerald-50/50 text-emerald-700' : optIdx === studentAns ? 'border-red-500 bg-red-50/50 text-red-700' : 'border-slate-50 bg-slate-50/50 text-slate-400'}`}>
                                                                    <span className={`w-6 h-6 rounded-lg flex items-center justify-center font-black ${optIdx === q.c ? 'bg-emerald-500 text-white' : optIdx === studentAns ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                                                        {q.type === 'tf' ? (optIdx === 0 ? '✓' : '✗') : MCQ_LABELS[optIdx]}
                                                                    </span>
                                                                    <span className="truncate">{opt}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                                
                                <div className="p-6 bg-white border-t flex justify-center shrink-0">
                                    <button onClick={() => setTeacherReview({ show: false, resultData: null })} className="bg-slate-900 text-white px-10 py-4 rounded-[2rem] font-black shadow-xl transition-all active:scale-95 hover:bg-slate-800 flex items-center gap-2">
                                        <span>إغلاق المراجعة</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MAIN UI */}
                    {view === 'cover' && (
                        <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-emerald-50 to-indigo-50">
                            <div className="max-w-md w-full bg-white rounded-[4rem] shadow-2xl p-12 flex flex-col items-center border-t-[16px] border-emerald-600 animate-in">
                                <div className="w-28 h-28 bg-emerald-600 rounded-[2.5rem] flex items-center justify-center text-6xl mb-10 text-white shadow-xl">🕌</div>
                                <h1 className="text-3xl md:text-4xl font-black text-slate-800 mb-2 text-center" dangerouslySetInnerHTML={{ __html: t('title') }}></h1>
                                <p className="text-emerald-600 font-bold opacity-80 mb-10 text-xs uppercase tracking-widest text-center">{t('subtitle')}</p>
                                <div className="w-full space-y-4 mb-10">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 px-2 uppercase tracking-widest">{t('subject')}</label>
                                        <select className="w-full p-5 bg-slate-50 border-2 rounded-2xl font-black text-center outline-none focus:border-emerald-500 shadow-sm" value={student.subject} onChange={e => setStudent({...student, subject: e.target.value, selectedFile: ''})}>
                                            {SUBJECT_LIST.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 px-2 uppercase tracking-widest">{t('examFile')}</label>
                                        <select className="w-full p-5 bg-slate-50 border-2 rounded-2xl font-black text-center outline-none focus:border-emerald-500 shadow-sm disabled:opacity-50" value={student.selectedFile} onChange={e => setStudent({...student, selectedFile: e.target.value})} disabled={availableFiles.length === 0}>
                                            <option value="">{t('chooseFile')}</option>
                                            {availableFiles.map(f => <option key={f} value={f}>{f}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 px-2 uppercase tracking-widest">{t('studentName')}</label>

                                                                    </div>
                                                                    <div className="flex gap-4 border-t pt-6 justify-center">
                                                                        <button onClick={() => saveScheduleSettings(expandedFile)} className="flex-1 bg-indigo-600 text-white py-4 px-6 rounded-2xl font-black shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 font-bold"><Icon name="save" className="w-5 h-5" /> <span>{t('save')}</span></button>
                                                                        <button onClick={() => deleteFileBank(expandedFile)} className="bg-red-500 text-white p-4 rounded-2xl font-black shadow-lg transition-all active:scale-95 flex items-center justify-center font-bold"><Icon name="trash-2" className="w-5 h-5" /></button>
                                                                    </div>
                                                                </div>
                                                                <div className="bg-white rounded-[2.5rem] border shadow-xl overflow-hidden text-right">
                                                                    <div className="bg-slate-900 p-6 text-white flex justify-between items-center"><h3 className="text-xl font-black">{expandedFile}</h3><p className="text-xs text-emerald-400 font-bold">المادة: {(groupedQuestions[expandedFile] || [])[0]?.subject} | الفصل: {(groupedQuestions[expandedFile] || [])[0]?.examClass || 'غير محدد'}</p></div>
                                                                    <div className="p-6 space-y-4 max-h-[50vh] overflow-y-auto hide-scroll text-right">
                                                                        {(groupedQuestions[expandedFile] || []).map((q, i) => (
                                                                            <div key={i} className="p-5 bg-slate-50 rounded-2xl border flex flex-col gap-4 shadow-sm group hover:border-indigo-100 transition-all">
                                                                                <div className="flex justify-between items-start gap-4">
                                                                                    <h4 className="font-black text-slate-800 text-right flex-1 leading-relaxed">{i+1}. {q.q} <span className="text-[10px] text-indigo-400 bg-indigo-50 px-2 py-0.5 rounded-lg mr-2 font-bold">({q.p || 0} {t('points')})</span></h4>
                                                                                    <div className="flex gap-1"><button onClick={() => setEditModal({ show: true, data: JSON.parse(JSON.stringify(q)), isLocal: false })} className="p-2 text-slate-300 hover:text-indigo-500 transition-all"><Icon name="edit-3" className="w-5 h-5" /></button><button onClick={() => deleteSingleQuestion(q.id)} className="p-2 text-slate-300 hover:text-red-500 transition-all"><Icon name="trash-2" className="w-5 h-5" /></button></div>
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ) : <div className="h-full flex items-center justify-center p-20 text-slate-300 font-black text-xl border-2 border-dashed rounded-[3rem] font-bold">يرجى اختيار ملف من القائمة لعرضه</div>}
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                                    <div className="lg:col-span-2 bg-white p-8 rounded-[3rem] border shadow-xl space-y-6 overflow-y-auto max-h-[85vh] hide-scroll text-right">
                                                        <div className="flex justify-between items-center"><h3 className="text-xl font-black">{t('add')}</h3><button onClick={() => setShowImport(true)} className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-indigo-100 transition-all font-bold"><Icon name="upload-cloud" className="w-4 h-4" /> {t('import')}</button></div>
                                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                            <div className="md:col-span-1 space-y-1"><label className="text-[10px] font-black text-slate-400 px-2">اسم ملف الاختبار</label><input type="text" placeholder={t('examFile')} className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-center outline-none focus:border-emerald-500 shadow-sm" value={fileName} onChange={e => setFileName(e.target.value)} /></div>
                                                            <div className="md:col-span-1 space-y-1"><label className="text-[10px] font-black text-slate-400 px-2">المادة</label><select className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-right outline-none" value={student.subject} onChange={e => setStudent({...student, subject: e.target.value})}>{SUBJECT_LIST.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                                            <div className="md:col-span-1 space-y-1"><label className="text-[10px] font-black text-slate-400 px-2">الفصل الدراسي</label><select className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-center outline-none" value={examClass} onChange={e => setExamClass(e.target.value)}><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></div>
                                                        </div>
                                                        <div className="bg-violet-50 p-6 rounded-[2.5rem] border border-violet-100 space-y-4">
                                                            <div className="flex items-center gap-2 text-violet-600 font-black mb-2"><Icon name="sparkles" className="w-5 h-5" /><span>الأوامر الذكية (AI)</span></div>
                                                            <textarea placeholder="مثال: اكتب 3 أسئلة خيار من متعدد حول موضوع الصلاة..." className="w-full p-4 bg-white border-2 border-violet-200 rounded-2xl text-sm outline-none focus:border-violet-500 min-h-[100px] font-bold" value={aiCommand} onChange={e => setAiCommand(e.target.value)} />
                                                            <button onClick={generateAiQuestions} className="w-full gemini-loading text-white py-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95 disabled:opacity-50" disabled={aiLoading}>{aiLoading ? "جاري التوليد..." : "توليد الأسئلة بذكاء"}</button>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div className="flex items-center bg-slate-50 border-2 rounded-2xl p-4 gap-3"><Icon name="clock" className="text-emerald-500 w-5 h-5" /><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{t('duration')}</span><input type="number" className="bg-transparent w-full text-right font-black outline-none" value={examDuration} onChange={e => setExamDuration(e.target.value)} /></div>
                                                            <div className="flex items-center bg-slate-50 border-2 rounded-2xl p-4 gap-3"><Icon name="star" className="text-indigo-500 w-5 h-5" /><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{t('points')}</span><input type="number" className="bg-transparent w-full text-right font-black outline-none" value={newQ.p} onChange={e => setNewQ({...newQ, p: Number(e.target.value)})} /></div>
                                                        </div>
                                                        <div className="space-y-4 pt-4 border-t text-right">
                                                            <div className="flex justify-start"><div className="flex bg-slate-100 p-1 rounded-xl w-auto"><button onClick={() => setNewQ({...newQ, type: 'mcq', a: ['', ''], c: 0})} className={`px-4 py-2 rounded-lg font-black text-xs transition-all ${newQ.type === 'mcq' ? 'bg-white shadow-md text-emerald-600' : 'text-slate-400'}`}>{t('mcq')}</button><button onClick={() => setNewQ({...newQ, type: 'tf', a: ['صح', 'خطأ'], c: 0})} className={`px-4 py-2 rounded-lg font-black text-xs transition-all ${newQ.type === 'tf' ? 'bg-white shadow-md text-emerald-600' : 'text-slate-400'}`}>{t('tf')}</button></div></div>
                                                            <textarea placeholder={t('qPlaceholder')} className="w-full p-5 bg-slate-50 border rounded-2xl font-black h-24 text-right outline-none focus:border-emerald-500 shadow-inner" value={newQ.q} onChange={e => setNewQ({...newQ, q: e.target.value})} />
                                                            <div className="space-y-3">
                                                                {newQ.a.map((opt, i) => (<div key={i} className={`flex items-center gap-2 p-3 border-2 rounded-xl transition-all ${newQ.c === i ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-100 bg-white'}`}><span className="font-black text-slate-400 shrink-0 w-6 text-center">{MCQ_LABELS[i]}</span><input type="text" placeholder={`خيار ${i+1}`} className="flex-1 bg-transparent text-sm font-bold text-right outline-none" value={opt} onChange={e => { const na = [...newQ.a]; na[i] = e.target.value; setNewQ({...newQ, a: na}); }} /><div className="flex gap-2 shrink-0"><input type="radio" checked={newQ.c === i} onChange={() => setNewQ({...newQ, c: i})} className="w-5 h-5 accent-emerald-500" />{newQ.type === 'mcq' && newQ.a.length > 2 && (<button onClick={() => { const na = newQ.a.filter((_, idx) => idx !== i); setNewQ({...newQ, a: na, c: 0}); }} className="text-red-300 hover:text-red-500 transition-colors"><Icon name="minus-circle" className="w-4 h-4" /></button>)}</div></div>))}
                                                                {newQ.type === 'mcq' && newQ.a.length < 4 && (<button onClick={() => setNewQ({...newQ, a: [...newQ.a, '']})} className="w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-xs font-black flex items-center justify-center gap-2 hover:bg-slate-50 transition-all font-bold font-bold"><Icon name="plus-circle" className="w-4 h-4" /> إضافة خيار آخر</button>)}
                                                            </div>
                                                            <button onClick={addToLocal} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition-all active:scale-95 flex items-center justify-center gap-3 font-bold"><Icon name="plus" className="w-5 h-5" /> <span>{t('add')}</span></button>
                                                        </div>
                                                    </div>
                                                    <div className="lg:col-span-2 space-y-4">
                                                        <div className="bg-indigo-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-lg text-right"><div><h3 className="text-xl font-black">{t('previewTitle')}</h3><p className="text-xs opacity-70">إجمالي: {localQuestions.length} سؤال لطلاب الفصل {examClass}</p></div></div>
                                                        <div className="space-y-4 max-h-[70vh] overflow-y-auto pr-2 hide-scroll pb-20 text-right">
                                                            {localQuestions.map((q, i) => (
                                                                <div key={i} className="p-6 bg-white border rounded-[2rem] shadow-sm flex flex-col gap-4 group transition-all hover:border-indigo-100">
                                                                    <div className="flex justify-between items-start gap-4"><div className="flex-1"><h4 className="font-black text-slate-800 leading-relaxed font-bold">{i+1}. {q.q} <span className="text-[10px] text-indigo-400 bg-indigo-50 px-2 py-0.5 rounded-lg mr-2 font-bold font-bold">({q.p || 0} {t('points')})</span></h4></div><div className="flex gap-1"><button onClick={() => setEditModal({ show: true, data: JSON.parse(JSON.stringify(q)), isLocal: true })} className="text-slate-300 hover:text-indigo-500 p-2 transition-colors"><Icon name="edit-3" className="w-5 h-5" /></button><button onClick={() => setLocalQuestions(localQuestions.filter(x => x.id !== q.id))} className="text-slate-300 hover:text-red-500 p-2 transition-colors"><Icon name="trash-2" className="w-5 h-5" /></button></div></div>
                                                                    <div className="grid grid-cols-2 gap-2 mt-2">{q.a.map((opt, optIdx) => (opt !== undefined && (q.type === 'mcq' || optIdx < 2)) && (<div key={optIdx} className={`px-4 py-2 rounded-xl text-xs flex items-center gap-2 ${optIdx === q.c ? 'bg-emerald-50 text-emerald-700 font-black border border-emerald-100' : 'bg-slate-50 text-slate-400 border border-slate-100'}`}><span className="shrink-0">{q.type === 'tf' ? (optIdx === 0 ? '✓' : '✗') : MCQ_LABELS[optIdx]}:</span><span className="truncate">{opt}</span>{optIdx === q.c && <Icon name="check" className="w-3 h-3 text-emerald-500" />}</div>))}</div>
                                                                </div>
                                                            ))}
                                                            {localQuestions.length === 0 && <div className="text-center p-20 text-slate-300 border-2 border-dashed rounded-[3rem] font-bold">لم تقم بإضافة أسئلة بعد</div>}
                                                        </div>
                                                        {localQuestions.length > 0 && <button onClick={saveQuestionsToDB} className="w-full bg-indigo-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl flex items-center justify-center gap-4 hover:bg-indigo-700 transition-all active:scale-95 font-bold"><Icon name="save" className="w-6 h-6" /> <span>{t('saveBank')} ({localQuestions.length})</span></button>}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RENAME MODAL */}
                    {renameModal.show && (
                        <div className="fixed inset-0 modal-overlay z-[700] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] max-w-sm w-full shadow-2xl p-8 text-right animate-in border-t-8 border-indigo-500 font-bold">
                                <h3 className="text-xl font-black mb-6 flex items-center gap-3 text-indigo-600 font-bold"><Icon name="edit-3" className="w-6 h-6" /> {t('renameFile')}</h3>
                                <div className="space-y-5">
                                    <div className="space-y-1"><label className="text-[11px] font-black text-slate-400 px-2 uppercase tracking-widest font-bold">الاسم الجديد</label><input type="text" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-center outline-none focus:border-indigo-500 shadow-sm" value={renameModal.newName} onChange={e => setRenameModal({...renameModal, newName: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[11px] font-black text-slate-400 px-2 uppercase tracking-widest font-bold">الفصل الدراسي</label><select className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black text-center outline-none focus:border-indigo-500" value={renameModal.newClass} onChange={e => setRenameModal({...renameModal, newClass: e.target.value})}><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></div>
                                </div>
                                <div className="flex gap-4 mt-10">
                                    <button onClick={renameFileBank} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-all active:scale-95 flex items-center justify-center gap-3 font-bold"><Icon name="check" className="w-5 h-5" /> <span>تحديث</span></button>
                                    <button onClick={() => setRenameModal({ show: false, oldName: '', newName: '', oldClass: '', newClass: '' })} className="px-6 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black font-bold">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {editModal.show && editModal.data && (
                        <div className="fixed inset-0 modal-overlay z-[600] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] max-w-2xl w-full shadow-2xl overflow-hidden flex flex-col text-right max-h-[85vh] font-bold">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center shrink-0"><h3 className="font-bold flex items-center gap-2 text-lg font-bold"><Icon name="edit-3" className="w-6 h-6" /> {editModal.isLocal ? 'تعديل السؤال (قبل الحفظ)' : 'تعديل السؤال في البنك'}</h3><button onClick={() => setEditModal({ show: false, data: null, isLocal: false })} className="p-2 hover:bg-white/10 rounded-xl transition-colors"><Icon name="x" className="w-6 h-6" /></button></div>
                                <div className="p-8 space-y-6 overflow-y-auto hide-scroll flex-1">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[11px] font-black text-slate-400 px-2 uppercase tracking-widest font-bold">نوع السؤال</label><div className="flex bg-slate-100 p-1 rounded-xl"><button onClick={() => setEditModal({...editModal, data: {...editModal.data, type: 'mcq'}})} className={`flex-1 py-2 rounded-lg font-black text-xs transition-all ${editModal.data.type === 'mcq' ? 'bg-white shadow text-emerald-600' : 'text-slate-400'}`}>{t('mcq')}</button><button onClick={() => setEditModal({...editModal, data: {...editModal.data, type: 'tf', a: ['صح', 'خطأ'], c: 0}})} className={`flex-1 py-2 rounded-lg font-black text-xs transition-all ${editModal.data.type === 'tf' ? 'bg-white shadow text-emerald-600' : 'text-slate-400'}`}>{t('tf')}</button></div></div>
                                        <div className="space-y-1"><label className="text-[11px] font-black text-slate-400 px-2 uppercase tracking-widest font-bold">{t('points')}</label><input type="number" className="w-full p-3 bg-slate-50 border-2 rounded-2xl font-bold text-center outline-none focus:border-indigo-500 font-bold" value={editModal.data.p} onChange={e => setEditModal({...editModal, data: {...editModal.data, p: Number(e.target.value)}})} /></div>
                                    </div>
                                    <div className="space-y-2"><label className="text-[11px] font-black text-slate-400 px-2 uppercase tracking-widest font-bold">نص السؤال</label><textarea className="w-full p-5 bg-slate-50 border-2 rounded-2xl font-bold text-right outline-none focus:border-indigo-500 shadow-sm transition-all" value={editModal.data.q} onChange={e => setEditModal({...editModal, data: {...editModal.data, q: e.target.value}})} /></div>
                                    <div className="space-y-4 pb-4">
                                        <label className="text-[11px] font-black text-slate-400 px-2 uppercase tracking-widest font-bold">خيارات الإجابة</label>
                                        <div className="space-y-3 text-right">{editModal.data.a.map((opt, i) => (opt !== undefined && (editModal.data.type === 'mcq' || i < 2)) && (<div key={i} className={`flex items-center gap-3 p-4 rounded-2xl border-2 transition-all ${editModal.data.c === i ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-100 bg-white'}`}><span className="font-black text-slate-400 shrink-0 w-8 text-center text-lg">{editModal.data.type === 'tf' ? (i === 0 ? '✓' : '✗') : MCQ_LABELS[i]}</span><input type="text" className="flex-1 bg-transparent font-bold text-right outline-none text-base" value={opt} onChange={e => { const na = [...editModal.data.a]; na[i] = e.target.value; setEditModal({...editModal, data: {...editModal.data, a: na}}); }} /><div className="flex gap-3 shrink-0 items-center"><input type="radio" name="edit_choice_radio" checked={editModal.data.c === i} onChange={() => setEditModal({...editModal, data: {...editModal.data, c: i}})} className="w-6 h-6 accent-emerald-500 cursor-pointer" />{editModal.data.type === 'mcq' && editModal.data.a.length > 2 && (<button onClick={() => { const na = editModal.data.a.filter((_, idx) => idx !== i); setEditModal({...editModal, data: {...editModal.data, a: na, c: 0}}); }} className="text-red-300 hover:text-red-500 transition-colors"><Icon name="minus-circle" className="w-4 h-4" /></button>)}</div></div>))}
                                        {editModal.data.type === 'mcq' && editModal.data.a.length < 4 && (<button type="button" onClick={() => setEditModal({...editModal, data: {...editModal.data, a: [...editModal.data.a, '']}})} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 text-sm font-black flex items-center justify-center gap-2 hover:bg-slate-50 hover:border-indigo-200 hover:text-indigo-400 transition-all mt-2 mb-4 font-bold font-bold font-bold"><Icon name="plus-circle" className="w-5 h-5" /> إضافة خيار آخر (ج، د)</button>)}</div>
                                    </div>
                                </div>
                                <div className="p-8 bg-white border-t shrink-0"><button onClick={saveEditedQuestion} className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black shadow-lg hover:bg-emerald-700 transition-all active:scale-95 text-lg font-bold flex items-center justify-center gap-3 font-bold"><span>{t('save')}</span><Icon name="save" className="w-6 h-6" /></button></div>
                            </div>
                        </div>
                    )}

                    {teacherAuthUI.show && (
                        <div className="fixed inset-0 modal-overlay z-[500] flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl animate-in text-right font-bold">
                                <h2 className="text-2xl font-black text-center mb-6">{teacherAuthUI.isRegistering ? t('register') : t('login')}</h2>
                                <div className="space-y-4"><input type="text" placeholder={t('username')} className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold text-center outline-none focus:border-emerald-500 transition-all" value={teacherAuthUI.username} onChange={e => setTeacherAuthUI({...teacherAuthUI, username: e.target.value})} /><input type="password" placeholder={t('password')} className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold text-center outline-none focus:border-emerald-500 transition-all" value={teacherAuthUI.password} onChange={e => setTeacherAuthUI({...teacherAuthUI, password: e.target.value})} /></div>
                                <button onClick={handleTeacherAuth} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black mt-6 shadow-lg hover:bg-emerald-700 transition-all active:scale-95">{teacherAuthUI.isRegistering ? t('register') : t('login')}</button>
                                <button onClick={() => setTeacherAuthUI(p => ({ ...p, isRegistering: !p.isRegistering }))} className="w-full text-emerald-600 text-xs font-bold mt-4 text-center block hover:underline">{teacherAuthUI.isRegistering ? 'لديك حساب بالفعل؟ سجل دخول' : 'ليس لديك حساب؟ سجل كمعلم جديد'}</button>
                                <button onClick={() => setTeacherAuthUI(p => ({ ...p, show: false }))} className="w-full text-slate-400 font-bold mt-2 text-xs text-center block">{t('cancel')}</button>
                            </div>
                        </div>
                    )}

                    {showImport && (
                        <div className="fixed inset-0 modal-overlay z-[600] flex items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-[4rem] max-w-2xl w-full shadow-2xl animate-in text-right font-bold border-t-8 border-indigo-500 font-bold">
                                <h3 className="text-3xl font-black mb-6 flex items-center gap-3 text-indigo-600"><Icon name="upload-cloud" className="w-8 h-8" /> {t('import')}</h3>
                                <textarea className="w-full p-8 bg-slate-50 border-2 rounded-[2rem] h-72 font-bold text-right outline-none focus:border-indigo-500 mb-8 shadow-inner" value={importText} onChange={e => setImportText(e.target.value)} placeholder={t('importPlaceholder')}></textarea>
                                <div className="flex gap-5"><button onClick={processImport} className="flex-1 bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black shadow-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-3 font-bold font-bold"><Icon name="check" className="w-6 h-6" /> <span>استيراد</span></button><button onClick={() => setShowImport(false)} className="px-10 bg-slate-100 text-slate-500 py-5 rounded-[1.5rem] font-black font-bold">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
