    <script type="module">

        let currentUser = null;

        const sections = [
            { id: 0, title: "Pangkal Haji (269-272)", icon: "📜", cards: [
                { id: "269", ar: "٢٦٩- والأصل فيه قوله تعالى: {وَلِلَّهِ عَلَى النَّاسِ حِجُّ الْبَيْتِ مَنِ اسْتَطَاعَ إِلَيْهِ سَبِيلًا} [آل عمران: ٩٧]", idn: "Hukum asal haji adalah firman Allah Ta'ala: 'Mengerjakan haji adalah kewajiban manusia terhadap Allah, yaitu (bagi) orang yang sanggup mengadakan perjalanan ke Baitullah.'", note: "قرر الشيخ، أن العبد إذا حج بعد بلوغه وقبل حريته، أن حجته هي حجة الإسلام، ولا يلزمه إعادتها بعد حريته. كما قرر الشيخ أن النائب في الحج لا يلزمه أن يكون من بلد المنوب عنه." },
                { id: "270", ar: "٢٧٠- وَالِاسْتِطَاعَةُ أَعْظَمُ شُرُوطِهِ، وَهِيَ مِلْكُ اَلزَّادِ وَالرَّاحِلَةِ، بَعْدَ ضَرُورَاتِ اَلْإِنْسَانِ وَحَوَائِجِهِ اَلْأَصْلِيَّةِ.", idn: "Kemampuan (istitho'ah) adalah syarat yang paling utama, yaitu memiliki bekal dan tunggangan setelah memenuhi kebutuhan pokok dan hajat dasarnya." },
                { id: "271", ar: "٢٧١- وَمِنْ اَلِاسْتِطَاعَةِ أَنْ يَكُونَ لِلْمَرْأَةِ مَحْرَمٌ إِذَا اِحْتَاجَ لِسَفَرٍ.", idn: "Termasuk bagian dari kemampuan bagi wanita adalah adanya mahram jika ia membutuhkan perjalanan (safar)." },
                { id: "272", ar: "٢٧٢- وَحَدِيثُ جَابِرٍ فِي حَجِّ اَلنَّبِيِّ ﷺ يشتمل على أعظم أَحْكَامِ اَلْحَجِّ، وَهُوَ مَا رَوَاهُ مُسْلِمٌ عَنْ جَابِرِ بْنِ عَبْدِ اَللَّهِ رضي الله عنهما،", idn: "Dan hadits Jabir mengenai haji Nabi ﷺ mencakup hukum-hukum haji yang paling agung, yaitu apa yang diriwayatkan oleh Muslim dari Jabir bin Abdullah r.a.", note: "وقد ذكر في الأصل المنقول منه هذا، حديث جابر بكماله الذي رواه مسلم، وهو يشتمل على معظم أحكام الحج فليرجع إليه." }
            ]},
            { id: 1, title: "Persiapan & Keberangkatan", icon: "🐪", cards: [
                { id: "m1", ar: "١- أَنَّ اَلنَّبِيَّ ﷺ مَكَثَ فِي اَلْمَدِينَةِ تِسْعَ سِنِينَ لَمْ يَحُجَّ، ثُمَّ أَذَّنَ فِي اَلنَّاسِ فِي اَلْعَاشِرَةِ، أَنَّ رَسُولَ اَللَّهِ حَاجٌّ، فَقَدِمَ اَلْمَدِينَةَ بَشَرٌ كَثِيرٌ (كُلُّهُمْ يلتمس أن يأتم الناس بِرَسُولِ اَللَّهِ ﷺ وَيَعْمَلُ مثله)", idn: "1- Bahwa Nabi ﷺ tinggal di Madinah selama sembilan tahun belum menunaikan haji. Kemudian pada tahun kesepuluh diumumkan kepada manusia bahwa Rasulullah akan berhaji. Maka datanglah manusia yang sangat banyak ke Madinah.", note: "مسلم (1218). قال النووي: وهو حديث عظيم، مشتمل على جمل من الفوائد، ونفائس من مهمات القواعد... وصنف فيه ابن المنذر جزءا كبيرا، وخرج فيه من الفقه مائة ونيفا وخمسين نوعا." },
                { id: "m2", ar: "٢- فَخَرَجْنَا مَعَهُ حَتَّى إِذَا أَتَيْنَا: ذَا الْحُلَيْفَةِ، فَوَلَدَتْ أَسْمَاءُ بِنْتُ عُمَيْسٍ مُحَمَّدَ بْنَ أَبِي بَكْرٍ، فَأَرْسَلَتْ إِلَى رَسُولِ اَللَّهِ ﷺ: كَيْفَ أَصْنَعُ؟ قَالَ: اِغْتَسِلِي، وَاسْتَثْفِرِي بثوب، وأحرمي.", idn: "2- Maka kami keluar bersama beliau hingga sampai di Dzul Hulaifah. Asma' binti Umais melahirkan Muhammad bin Abu Bakar, lalu bertanya: 'Apa yang harus aku lakukan?' Beliau bersabda: 'Mandilah, balutlah tempat keluarnya darah dengan kain (istis-far), dan berihramlah.'", note: "استثفار المرأة، أن تشد على وسطها شيئا، ثم تأخذ خرقة عريضة تجعلها في محل الدم، وتشدها من ورائها وقدامها؛ ليمنع الخارج، وفي معناها: الحفائظ الآن." }
            ]},
            { id: 2, title: "Ihram & Talbiyah", icon: "📢", cards: [
                { id: "m3", ar: "٣- (فصلى رسول الله ﷺ فِي اَلْمَسْجِدِ)، ثُمَّ رَكِبَ اَلْقَصْوَاءَ حَتَّى إِذَا اِسْتَوَتْ بِهِ نَاقَتُهُ عَلَى اَلْبَيْدَاءِ أهَلَّ بِالتَّوْحِيدِ: لَبَّيْكَ اَللَّهُمَّ لَبَّيْكَ، لَبَّيْكَ لَا شَرِيكَ لَكَ لَبَّيْكَ، إِنَّ اَلْحَمْدَ وَالنِّعْمَةَ لَكَ وَالْمُلْكَ، لَا شَرِيكَ لَكَ.", idn: "3- (Nabi shalat di masjid), lalu menunggang Al-Qaswa hingga untanya berdiri tegak di Al-Baida', beliau ber-ihlal dengan kalimat tauhid: 'Labbaikallahumma labbaik...'", note: "القصواء: اسم لناقة النبي ﷺ. البيداء: الفلاة. لبيك: إجابة لك بعد إجابة." },
                { id: "m4", ar: "٤- وأهلَّ اَلنَّاسُ بِهَذَا اَلَّذِي يُهِلُّونَ بِهِ، فَلَمْ يَرُدَّ رَسُولُ اَللَّهِ ﷺ عَلَيْهِمْ شَيْئًا مِنْهُ، ٥- وَلَزِمَ رَسُولُ اَللَّهِ ﷺ تَلْبِيَتَهُ.", idn: "4-5 Orang-orang ber-ihlal dengan apa yang mereka ucapkan, Nabi tidak menolak satupun, namun beliau tetap melantunkan talbiyah beliau sendiri.", note: "الإهلال: رفع الصوت بالتلبية." },
                { id: "m6", ar: "٦- قَالَ جَابِرٌ: لَسْنَا نَنْوِي إِلَّا اَلْحَجَّ، لَسْنَا نَعْرِفُ اَلْعُمْرَةَ.", idn: "6- Jabir berkata: 'Kami tidak berniat kecuali haji, kami saat itu belum mengenal umrah (di bulan haji).'" }
            ]},
            { id: 3, title: "Tawaf di Baitullah", icon: "🕋", cards: [
                { id: "m7", ar: "٧- حَتَّى إِذَا أَتَيْنَا اَلْبَيْتَ مَعَهُ اِسْتَلَمَ الركن، ٨- فطاف سبعًا، ٩- فرمل ثلاثًا، ومشى أربعًا،", idn: "7-9 Ketika tiba di Baitullah, beliau mengusap Rukun (Hajar Aswad), lalu tawaf tujuh kali: berlari kecil (raml) tiga putaran dan berjalan biasa empat putaran.", note: "الرمل: الإسراع في المشي مع مقاربة الخطا." },
                { id: "m10", ar: "١٠- ثُمَّ نَفَذَ إِلَى مَقَامِ إِبْرَاهِيمَ فَقَرَأَ: {وَاتَّخِذُوا مِنْ مَقَامِ إِبْرَاهِيمَ مُصَلّى}، ١١- فَصَلَّى رَكْعَتَيْنِ، فَجَعَلَ اَلْمَقَامَ بَيْنَهُ وَبَيْنَ اَلْبَيْتِ.", idn: "10-11 Kemudian beliau menuju Maqam Ibrahim dan membaca ayat... lalu shalat dua rakaat dengan Maqam berada di antara beliau dan Ka'bah." },
                { id: "m12", ar: "١٢- وَفِي رِوَايَةٍ: أَنَّهُ قَرَأَ فِي اَلرَّكْعَتَيْنِ: {قُلْ هُوَ اللَّهُ أَحَدٌ} وَ {قُلْ يَا أَيُّهَا الْكَافِرُونَ}.", idn: "12- Dalam sebuah riwayat: Beliau membaca Al-Ikhlas dan Al-Kafirun pada shalat tersebut." },
                { id: "m13", ar: "١٣- ثُمَّ رَجَعَ إِلَى اَلرُّكْنِ وَاسْتَلَمَهُ، ١٤- ثُمَّ خَرَجَ مِنْ اَلْبَابِ إِلَى اَلصَّفَا،", idn: "13-14 Beliau kembali mengusap Rukun, lalu keluar melalui pintu menuju bukit Safa." }
            ]},
            { id: 4, title: "Sa'i Safa & Marwah", icon: "⛰️", cards: [
                { id: "m15", ar: "١٥- فَلَمَّا دَنَا مِنْ اَلصَّفَا قَرَأَ: {إِنَّ اَلصَّفَا وَالْمَرْوَةَ مِنْ شَعَائِرِ اَللَّهِ}، ١٦- فَرَقَى عَلَيْهِ حَتَّى رَأَى اَلْبَيْتَ، ١٧- فَاسْتَقْبَلَ اَلْقِبْلَةَ، ١٨- فَوَحَّدَ الله وكبره، قال: لَا إِلَهَ إِلَّا اَللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ... (ثلاث مرات).", idn: "15-18 Tatkala mendekati Safa beliau membaca ayat... lalu naik hingga melihat Ka'bah, menghadap kiblat, bertauhid, bertakbir, dan berdoa (3 kali)." },
                { id: "m19", ar: "١٩- ثم نزل ومشي إلى المروة، ٢٠- hingga إذا انصبت قدماه في بطن الوادي سعى، ٢١- hingga إذا صعدتا مشى، ٢٢- حَتَّى أَتَى اَلْمَرْوَةَ، فَفَعَلَ عَلَى اَلْمَرْوَةِ كَمَا فَعَلَ عَلَى اَلصَّفَا،", idn: "19-22 Beliau turun menuju Marwah. Saat di perut lembah beliau berlari kecil (sa'i), saat menanjak beliau berjalan biasa. Di Marwah beliau melakukan apa yang dilakukan di Safa.", note: "في هامش 'ب': في الأصل مكان هذه الزيادة: 'فنادى وهو على المروة والناس تحته' ولا أصل لها في مسلم ولا في غيره." }
            ]},
            { id: 5, title: "Perintah Tahallul", icon: "✂️", cards: [
                { id: "m23", ar: "٢٣- حَتَّى إِذَا كَانَ آخِرُ طَوَافِهِ عَلَى اَلْمَرْوَةِ، فَقَالَ: لَوْ أَنِّي اِسْتَقْبَلْتُ مِنْ أَمْرِي مَا اِسْتَدْبَرْتُ لَمْ أَسُقْ اَلْهَدْيَ، وَجَعَلْتُهَا عُمْرَةً، فَمَنْ كَانَ مِنْكُمْ لَيْسَ مَعَهُ هدي فليحل وليجعلها عمرة.", idn: "23- Hingga di akhir tawaf Marwah beliau bersabda: 'Seandainya aku bisa mengulang urusanku, niscaya aku tidak membawa hadyu (hewan kurban) dan akan kujadikan umrah. Siapa yang tidak bawa hadyu, bertahallullah dan jadikan umrah.'" },
                { id: "m24", ar: "٢٤- فَقَامَ سُرَاقَةُ بْنُ مَالِكِ، فَقَالَ: يَا رَسُولَ اَللَّهِ، أَلِعَامِنَا هَذَا، أَمْ لِأَبَدٍ؟ فَشَبَّكَ رَسُولُ اَللَّهِ ﷺ أَصَابِعَهُ... وَقَالَ: دَخَلَتْ اَلْعُمْرَةُ فِي اَلْحَجِّ... بَلْ لِأَبَدِ أَبَدٍ.", idn: "24- Suraqah bertanya: 'Untuk tahun ini saja atau selamanya?' Nabi menjalin jemarinya dan bersabda: 'Umrah telah masuk ke dalam haji... untuk selamanya.'" }
            ]},
            { id: 6, title: "Ali & Kedatangan Hadyu", icon: "👥", cards: [
                { id: "m25", ar: "٢٥- وَقَدِمَ عَلِيٌّ مِنْ اَلْيَمَنِ بِبُدْنِ اَلنَّبِيِّ ﷺ (فَوَجَدَ فَاطِمَةَ مِمَّنْ حَلَّ، وليست ثيابًا صبيغًا واكتحلت، فأنكر ذلك عليها... فقال: صَدَقَتْ، صَدَقَتْ)، مَاذَا قُلْتَ حِينَ فَرَضْتَ اَلْحَجَّ؟ قَالَ: اَللَّهُمَّ إِنِّي أهلُّ بِمَا أَهَلَّ بِهِ رَسُولُكَ. قَالَ: فَإِنَّ مَعِيَ اَلْهَدْيَ فَلَا تَحِلُّ.", idn: "25- Ali datang dari Yaman membawa hadyu. Ia mendapati Fatimah telah tahallul. Nabi bersabda: 'Dia benar'. Nabi bertanya niat Ali, Ali menjawab: 'Niatku seperti Rasulullah'. Nabi bersabda: 'Aku bawa hadyu, maka jangan tahallul.'" },
                { id: "m26", ar: "٢٦- قَالَ: فَكَانَ جَمَاعَةُ اَلْهَدْيِ اَلَّذِي قَدِمَ بِهِ عَلِيٌّ مِنْ اَلْيَمَنِ، وَاَلَّذِي أَتَى بِهِ اَلنَّبِيُّ ﷺ مِائَةً. ٢٧- قَالَ: فَحَلَّ اَلنَّاسُ كُلُّهُمْ، وَقَصَّرُوا، إِلَّا اَلنَّبِيَّ ﷺ وَمَنْ كَانَ مَعَهُ هَدْيٌ.", idn: "26-27 Total hadyu ada 100 ekor. Semua orang bertahallul dan memotong rambut kecuali Nabi dan yang membawa hadyu." }
            ]},
            { id: 7, title: "Mina & Arafah", icon: "⛺", cards: [
                { id: "m28", ar: "٢٨- فَلَمَّا كَانَ يَوْمُ اَلتَّرْوِيَةِ تَوَجَّهُوا إِلَى مِنًى، ٢٩- فَأَهَلُّوا بِالْحَجِّ. ٣٠- وَرَكِبَ اَلنَّبِيُّ ﷺ فَصَلَّى بِهَا اَلظُّهْرَ وَالْعَصْرَ، وَالْمَغْرِبَ وَالْعِشَاءَ وَالْفَجْرَ، ٣١- ثُمَّ مَكَثَ قَلِيلًا حَتَّى طَلَعَتْ اَلشَّمْسُ،", idn: "28-31 Hari Tarwiyah (8 Dzulhijjah) mereka menuju Mina dan ihram haji. Nabi shalat Dzuhur sampai Subuh di sana, lalu menunggu matahari terbit.", note: "يوم التروية هو اليوم الثامن من ذي الحجة." },
                { id: "m32", ar: "٣٢- وَأَمَرَ بِقُبَّةٍ مَنْ شَعَرٍ تُضْرَبُ لَهُ بِنَمِرَةَ، فَسَارَ رَسُولُ اَللَّهِ ﷺ... فَأَجَازَ رَسُولُ اَللَّهِ ﷺ حَتَّى أَتَى عَرَفَةَ، فَوَجَدَ اَلْقُبَّةَ قَدْ ضُرِبَتْ لَهُ بِنَمِرَةَ، فَنَزَلَ بِهَا، ٣٣- حَتَّى إِذَا زاغت الشمس أمر بالقصواء فرحلت له،", idn: "32-33 Nabi memerintahkan tenda di Namirah. Beliau melewati Masy'aril Haram hingga tiba di Arafah. Saat matahari tergelincir beliau minta disiapkan unta.", note: "نمرة: موضع بجنب عرفات، وليست من عرفات. فأجاز: أي جاوز المزدلفة ولم يقف بها بل توجه إلى عرفات." },
                { id: "m34", ar: "٣٤- فَأَتَى بَطْنَ اَلْوَادِي فَخَطَبَ اَلنَّاسَ: وَقَالَ: إِنَّ دِمَاءَكُمْ وَأَمْوَالَكُمْ حَرَامٌ عَلَيْكُمْ... (الخُطبة).", idn: "34- Beliau tiba di perut lembah (Uranah) lalu berkhutbah: 'Sesungguhnya darah dan harta kalian suci/haram bagi kalian...'", note: "بطن الوadi: أي وادي عُرَنة، يحد عرفة من الجهة الغربية، وليس من عرفة. ينكبها: أي يشير بها. وفي رواية 'ينكتها'." }
            ]},
            { id: 8, title: "Muzdalifah & Mabit", icon: "🌌", cards: [
                { id: "m35", ar: "٣٥- ثُمَّ أَذَّنَ بِلَالٌ، ثُمَّ أَقَامَ فَصَلَّى اَلظُّهْرَ، ثُمَّ أَقَامَ فَصَلَّى اَلْعَصْرَ، ٣٦- وَلَمْ يصلِّ بَيْنَهُمَا شَيْئًا.", idn: "35-36 Bilal azan lalu iqamah untuk shalat Dzuhur dan Ashar (jamak), tanpa shalat sunnah di antara keduanya." },
                { id: "m37", ar: "٣٧- ثُمَّ رَكِبَ حَتَّى أَتَى اَلْمَوْقِفَ، ٣٨- فَجَعَلَ بَطْنَ نَاقَتِهِ اَلْقَصْوَاءِ إِلَى الصَّخَرَاتِ، وَجَعَلَ حَبْلَ المشاة بين يديه، واستقبل القبلة،", idn: "37-38 Nabi berkendara ke tempat wuquf, menghadap kiblat dengan perut unta di dekat bebatuan (Sakhirat).", note: "الصخرات: صخرات ملتصقة بالأرض خلف جبل عرفات. حبل المشاة: الطريق الذي يسلكه المشاة." },
                { id: "m39", ar: "٣٩- فلم يزل واقفًا حتى غربت الشمس, وذهبت الصفرة قليلًا حتى غاب القرص,", idn: "39- Beliau terus wuquf sampai matahari benar-benar tenggelam." },
                { id: "m40", ar: "٤٠- وأردف أسامة بن زيد خلفه، ودفع رسول الله ﷺ وَقَدْ شَنَقَ لِلْقَصْوَاءِ اَلزِّمَامَ، حَتَّى إِنَّ رَأْسَهَا يصيب مَوْرِكَ رَحْلِهِ،", idn: "40- Nabi membonceng Usamah dan bertolak dengan menarik tali kekang (shanaqa) unta dengan kuat.", note: "شنق: ضمَّ وضيق. المورك: الموضع من الرحل يجعل عليها الراكب رجله." },
                { id: "m41", ar: "٤١- وَيَقُولُ بِيَدِهِ اَلْيُمْنَى: أَيُّهَا اَلنَّاسُ، اَلسَّكِينَةَ، اَلسَّكِينَةَ... ٤٢- حَتَّى أَتَى اَلْمُزْدَلِفَةَ،", idn: "41-42 Beliau memberi isyarat tangan: 'Tenanglah, tenanglah' hingga sampai di Muzdalifah.", note: "الحبل: التل اللطيف من الرمل الضخم." },
                { id: "m43", ar: "٤٣- فَصَلَّى بِهَا اَلْمَغْرِبَ وَالْعِشَاءَ، بِأَذَانٍ وَاحِدٍ وَإِقَامَتَيْنِ، ٤٤- وَلَمْ يُسَبِّحْ بَيْنَهُمَا شَيْئًا، ٤٥- ثُمَّ اِضْطَجَعَ حتى طلع الفجر.", idn: "43-45 Di sana beliau shalat Maghrib dan Isya (satu azan, dua iqamah), lalu tidur sampai fajar.", note: "صوَّب الشيخ: أنه لا يجوز الدفع من مزدلفة قبل الفجر إلا لأهل العذر." }
            ]},
            { id: 9, title: "Masy'aril Haram & Lempar Jumrah", icon: "🎯", cards: [
                { id: "m46", ar: "٤٦- وصلى الفجر حين تبين له الصبح بأذان وإقامة, ٤٧- ثم ركب القصواء حتى أتى المشعر الحرام, ٤٨- فاستقبل القبلة, ٤٩- فدعاه, وكبرَّه, وهَلَّلَهُ, ووحده, ٥٠- فلم يزل واقفًا حتى أسفر جدًّا, ٥١- فدفع قبل أن تطلع الشمس,", idn: "46-51 Nabi shalat fajar, lalu ke Masy'aril Haram menghadap kiblat, berdoa, bertakbir, bertahlil sampai langit sangat terang, lalu berangkat sebelum matahari terbit." },
                { id: "m52", ar: "٥٢- وَأَرْدَفَ اَلْفَضْلَ بْنَ اَلْعَبَّاسِ، حَتَّى أَتَى بَطْنَ مُحَسِّر، فَحَرَّكَ قَلِيلًا،", idn: "52- Beliau membonceng Al-Fadhl bin Abbas hingga Wadi Muhassir, beliau sedikit mempercepat laju unta.", note: "مُحَسِّر: وادٍ يقع بين مزدلفة ومنى، الإسراع فيه سُنَّة." },
                { id: "m53", ar: "٥٣- ثُمَّ سَلَكَ اَلطَّرِيقَ اَلوُسْطَى اَلَّتِي تَخْرُجُ عَلَى اَلْجَمْرَةِ اَلْكُبْرَى، ٥٤- حَتَّى أَتَى اَلْجَمْرَةَ اَلَّتِي عِنْدَ اَلشَّجَرَةِ، فَرَمَاهَا بِسَبْعِ حَصَيَاتٍ، ٥٥- يكبر مع كل حصاة منها، ٥٦- مثل حصى الْخَذْف، ٥٧- رمى من بطن الوادي،", idn: "53-57 Beliau menempuh jalan tengah menuju Jumrah Aqabah, melempar tujuh kerikil (sebesar biji kacang) sambil bertakbir.", note: "الشجرة: كانت عند الجمرة الكبرى شجرة أزيلت قديما. حصى الخذف: حصى صغير." }
            ]},
            { id: 10, title: "Menyembelih, Ifadah & Penutup", icon: "✨", cards: [
                { id: "m58", ar: "٥٨- ثم انصرف إلى المنحر، ٥٩- فنحر ثلاثًا وستين بيده، ٦٠- ثم أعطى عليًّا فنحر ما غبر، وأشركه في هديه، ٦١- ثم أمر من كل بُدنة بِبَضْعة، فجعلت في قدر، وطبخت، فأكla من لحمها، وشربا من مرقها.", idn: "58-61 Nabi menyembelih 63 unta sendiri, sisanya disembelih Ali. Beliau minta sepotong daging dari tiap unta dimasak, lalu keduanya memakan daging dan kuahnya." },
                { id: "m62", ar: "٦٢- ثم ركب رسول الله ﷺ فَأَفَاضَ إِلَى اَلْبَيْتِ، ٦٣- فَصَلَّى بِمَكَّةَ اَلظُّهْرَ، ٦٤- فَأَتَى بَنِي عَبْدِ اَلْمُطَّلِبِ، يَسْقُونَ عَلَى زَمْزَمَ... فَنَاوَلُوهُ دَلْوًا فَشَرِبَ مِنْهُ. (رواه مسلم).", idn: "62-64 Beliau bertolak ke Ka'bah (Tawaf Ifadah), shalat Dzuhur di Makkah, lalu mendatangi Bani Abdul Muthalib di Zamzam dan minum dari ember mereka.", note: "ردَّ الشيخ على القائلين بجواز تأخير طواف الإفاضة عن أيام منى." },
                { id: "273", ar: "٢٧٣- وَكَانَ ﷺ يَفْعَلُ اَلْمَنَاسِكَ، وَيَقُولُ لِلنَّاسِ: 'خُذُوا عَنِّي مَنَاسِكَكُمْ'. فَأَكْمَلُ مَا يَكُونُ مِنْ اَلْحَجِّ: اَلِاقْتِدَاءُ بِالنَّبِيِّ ﷺ فِيهِ وَأَصْحَابِهِ رضي الله عنهم.", idn: "273- Nabi mengerjakan manasik dan bersabda: 'Ambillah dariku tata cara manasik haji kalian'. Kesempurnaan haji adalah dengan meneladani Nabi dan Sahabatnya." }
            ]}
        ];

        window.startApp = () => {
            document.getElementById('landingPage').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('landingPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('fade-in');
                initApp();
            }, 500);
        };

        const initApp = () => {
            signInAnonymously(auth).then(() => {
                onAuthStateChanged(auth, user => {
                    currentUser = user;
                    updateUI();
                });
            });
        };

        const updateUI = () => {
            renderPageContent();
            renderNav();
            document.getElementById('btnPrev').disabled = currentPage === 0;
            document.getElementById('btnNext').disabled = currentPage === (sections.length - 1);
            document.getElementById('pageIndicator').innerText = `${currentPage + 1}/${sections.length}`;
        };

        const renderPageContent = () => {
            const section = sections[currentPage];
            const container = document.getElementById('page-renderer');
            container.innerHTML = `
                <div class="flex items-center gap-4 mb-8 justify-start flex-row-reverse border-b-2 border-emerald-100 pb-4 fade-in">
                    <h2 class="text-2xl md:text-3xl font-bold text-emerald-900">${section.title}</h2>
                    <span class="text-4xl bg-emerald-50 p-3 rounded-2xl shadow-inner">${section.icon}</span>
                </div>
                <div class="space-y-6">
                    ${section.cards.map(card => `
                        <div class="bg-white rounded-3xl p-6 shadow-sm border-r-4 border-emerald-500 relative fade-in">
                            <p class="arabic-text text-2xl md:text-3xl text-slate-800 mb-6" dir="rtl">${card.ar}</p>
                            <div class="border-t border-slate-100 pt-4 latin-text text-slate-600 text-[15px] leading-relaxed mb-4">${card.idn}</div>
                            <div class="flex justify-end">
                                <button onclick="window.toggleSyarah('${card.id}')" class="flex items-center gap-2 text-emerald-600 font-bold hover:text-emerald-800 transition-colors bg-emerald-50 px-4 py-2 rounded-xl">
                                    <svg id="chevron-${card.id}" class="w-4 h-4 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    <span>🖋️ Syarah & Catatan</span>
                                </button>
                            </div>
                            <div id="syarah-${card.id}" class="syarah-dropdown latin-text">
                                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200 mt-2">
                                    <div class="flex gap-2 mb-3">
                                        <button onclick="window.setDir('${card.id}', 'ltr')" class="px-3 py-1 rounded-full text-[10px] font-extrabold bg-white border border-slate-200 text-slate-500">Latin</button>
                                        <button onclick="window.setDir('${card.id}', 'rtl')" class="px-3 py-1 rounded-full text-[10px] font-extrabold bg-white border border-slate-200 text-slate-500">Arab</button>
                                    </div>
                                    <textarea id="input-${card.id}" oninput="window.autoExpand(this)" class="w-full bg-transparent border-none focus:ring-0 text-slate-700 leading-relaxed resize-none overflow-hidden" placeholder="Tulis catatan..."></textarea>
                                    <div class="flex justify-end mt-2 pt-2 border-t border-slate-200">
                                        <button id="saveBtn-${card.id}" onclick="window.saveSyarah('${card.id}')" class="bg-emerald-600 text-white px-5 py-1.5 rounded-lg text-xs font-bold shadow-md">Simpan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        const renderNav = () => {
            const nav = document.getElementById('navLinks');
            nav.innerHTML = sections.map((s, i) => `
                <button onclick="window.goToPage(${i})" class="w-full text-right px-6 py-4 flex items-center justify-end gap-3 hover:bg-emerald-50 ${i === currentPage ? 'bg-emerald-50 text-emerald-700 font-bold border-r-4 border-r-emerald-500' : 'text-slate-600'}">
                    <span>${s.title}</span><span class="text-xl">${s.icon}</span>
                </button>
            `).join('');
        };

        window.goToPage = (i) => { currentPage = i; updateUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        window.toggleSyarah = async (cardId) => {
            const dropdown = document.getElementById(`syarah-${cardId}`);
            const chevron = document.getElementById(`chevron-${cardId}`);
            const isOpening = !dropdown.classList.contains('open');
            dropdown.classList.toggle('open');
            chevron.classList.toggle('rotate-180', isOpening);
            if (isOpening) {
                const textarea = document.getElementById(`input-${cardId}`);
                textarea.value = "Memuat...";
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'syarah', cardId);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    textarea.value = snap.data().text || "";
                } else {
                    const card = sections.flatMap(s => s.cards).find(c => c.id === cardId);
                    textarea.value = card.note || "";
                }
                window.autoExpand(textarea);
            }
        };
        window.autoExpand = (el) => { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; };
        window.setDir = (id, dir) => { const el = document.getElementById(`input-${id}`); el.dir = dir; el.style.textAlign = dir === "rtl" ? "right" : "left"; el.focus(); };
        window.saveSyarah = async (cardId) => {
            const textarea = document.getElementById(`input-${cardId}`);
            const btn = document.getElementById(`saveBtn-${cardId}`);
            btn.innerHTML = "..."; btn.disabled = true;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'syarah', cardId);
                await setDoc(docRef, { text: textarea.value, dir: textarea.dir, timestamp: Date.now() });
                btn.innerHTML = "✓"; setTimeout(() => btn.innerHTML = "Simpan", 2000);
            } catch (e) { btn.innerHTML = "!"; } finally { btn.disabled = false; }
        };

        document.getElementById('openSidebarBtn').onclick = () => { document.getElementById('sidebar').classList.remove('translate-x-full'); document.getElementById('sidebarOverlay').classList.remove('hidden'); };
        document.getElementById('closeSidebarBtn').onclick = () => { document.getElementById('sidebar').classList.add('translate-x-full'); document.getElementById('sidebarOverlay').classList.add('hidden'); };
        document.getElementById('btnPrev').onclick = () => window.goToPage(currentPage - 1);
        document.getElementById('btnNext').onclick = () => window.goToPage(currentPage + 1);
    </script>
</body>
</html>
